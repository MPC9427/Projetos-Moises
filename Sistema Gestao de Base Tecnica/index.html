	/* Botão de modo escuro */
	.dark-mode-toggle {
	position: absolute;
	top: 20px;
	right: 20px;
	background-color: #438acb;
	color: white;
	border: none;
	padding: 0.5rem 1rem;
	border-radius: 8px;
	cursor: pointer;
	font-size: 0.9rem;
	transition: background-color 0.3s;
	}

	.dark-mode-toggle:hover {
	background-color: #336fa3;
	}

	body.dark-mode {
	background-color: #121212;
	color: #f0f0f0;
	}

	body.dark-mode .logon {
	background-color: #1e1e1e;
	box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
	}

	body.dark-mode input,
	body.dark-mode button {
	background-color: #2c2c2c;
	color: #f0f0f0;
	border: 1px solid #555;
	}

	body.dark-mode a {
	color: #90caf9;
	}

	.piscar {
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

</style>
